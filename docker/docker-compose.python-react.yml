services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saas_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  python-api:
    build:
      context: ..
      dockerfile: docker/python-api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/saas_app"
      JWT_SECRET: change-me-in-production
      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://localhost
    depends_on:
      - postgres

  react-web:
    build:
      context: ..
      dockerfile: docker/react-web.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - python-api

volumes:
  pgdata:
