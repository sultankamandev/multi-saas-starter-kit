<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.Title}}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      line-height: 1.6;
      color: #2c3e50;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .email-wrapper {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 30px;
      text-align: center;
      color: white;
    }
    .header h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .header .stars {
      font-size: 24px;
      margin-top: 10px;
      opacity: 0.9;
    }
    .content {
      padding: 40px 30px;
    }
    .content h2 {
      color: #2c3e50;
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: 600;
    }
    .content p {
      color: #555;
      font-size: 16px;
      margin-bottom: 15px;
    }
    .greeting {
      font-size: 18px;
      color: #2c3e50;
      margin-bottom: 20px;
    }
    .welcome-box {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-left: 4px solid #667eea;
      padding: 25px;
      margin: 25px 0;
      border-radius: 8px;
    }
    .welcome-box p {
      margin: 0;
      color: #2c3e50;
    }
    .button {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin: 20px 0;
      font-weight: 600;
      font-size: 16px;
      text-align: center;
    }
    .button:hover {
      opacity: 0.9;
    }
    .expiry-note {
      color: #6c757d;
      font-size: 14px;
      margin-top: 20px;
      font-style: italic;
    }
    .footer {
      background-color: #f8f9fa;
      padding: 30px;
      text-align: center;
      border-top: 1px solid #e9ecef;
    }
    .footer p {
      color: #6c757d;
      font-size: 14px;
      margin: 5px 0;
    }
    .footer .brand {
      color: #667eea;
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 10px;
    }
    @media only screen and (max-width: 600px) {
      .content {
        padding: 30px 20px;
      }
      .header {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="header">
      <h1>SaaS Starter</h1>
      <div class="stars">{{.Stars}}</div>
    </div>
    <div class="content">
      <h2>{{.Title}}</h2>
      <p class="greeting">{{.Greeting}}</p>
      <div class="welcome-box">
        <p>{{.WelcomeMessage}}</p>
      </div>
      <p>{{.Message}}</p>
      <a href="{{.Link}}" class="button">{{.ButtonText}}</a>
      <p class="expiry-note">{{.ExpiryMessage}}</p>
      <p>{{.ThankYouMessage}}</p>
    </div>
    <div class="footer">
      <p class="brand">SaaS Starter</p>
      <p>{{.FooterText}}</p>
      <p style="margin-top: 15px; font-size: 12px;">{{.FooterNote}}</p>
    </div>
  </div>
</body>
</html>
